# Script Python pour générer le fichier de configuration GitHub Actions main.yml
# Ce fichier automatise le test, l'analyse de qualité (Sonar) et le déploiement Docker.

workflow_content = """name: CI devops 2025

on:
  # Déclenchement sur les branches main et develop
  push:
    branches:
      - main
      - develop
  # Déclenchement sur les Pull Requests
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Configuration du JDK 21 (Corretto)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      # Build, Test et Analyse SonarCloud
      # Note : Remplacez YOUR_PROJECT_KEY et YOUR_ORGANIZATION par vos valeurs SonarCloud
      - name: Build, test and analyze with Maven
        run: |
          mvn -B verify sonar:sonar \\
            -Dsonar.projectKey=YOUR_PROJECT_KEY \\
            -Dsonar.organization=YOUR_ORGANIZATION_NAME \\
            -Dsonar.host.url=https://sonarcloud.io \\
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \\
            --file ./simple-api/pom.xml

  build-and-push-docker-image:
    # Ce job ne s'exécute que si les tests et l'analyse Sonar réussissent
    needs: test-backend
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion au Docker Hub via les secrets GitHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Construction et Push de l'image Backend
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # Push uniquement si nous sommes sur la branche main
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construction et Push de l'image Database
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construction et Push de l'image HTTP Server
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}
"""

# Sauvegarde du contenu dans le fichier main.yml
with open("main.yml", "w", encoding="utf-8") as f:
    f.write(workflow_content)