---
- name: Launch PostgreSQL container
  docker_container:
    name: my-db-container
    image: greenway13/tp-devops-database:latest
    pull: true
    networks:
      - name: private-network
    volumes:
      - db-data:/var/lib/postgresql/data
    restart_policy: unless-stopped
    env:
      POSTGRES_USER: "usr"
      POSTGRES_PASSWORD: "pwd"
